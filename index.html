<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER ACE DELUXE - ROYAL SUPREMACY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 PREMIUM HEADER CONTROLLER PANEL -->
    <div class="header">
        <div class="brand">
            <div class="name">SUPER ACE DLX</div>
            <div class="game">5-REEL GOLDEN CASCADING</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🎰 DELUXE 5-REEL CARD MATRIX GRID -->
    <div class="superace-deluxe-zone">
        <div class="slot-window-frame">
            <!-- Emerald Win Payline Tracker -->
            <div class="laser-payline"></div>
            
            <div class="reels-wrapper">
                <!-- Reel 1 -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-0">
                        <div class="deluxe-tile">🎴</div>
                    </div>
                </div>
                <!-- Reel 2 -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-1">
                        <div class="deluxe-tile">🎴</div>
                    </div>
                </div>
                <!-- Reel 3 -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-2">
                        <div class="deluxe-tile">🎴</div>
                    </div>
                </div>
                <!-- Reel 4 -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-3">
                        <div class="deluxe-tile">🎴</div>
                    </div>
                </div>
                <!-- Reel 5 -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-4">
                        <div class="deluxe-tile">🎴</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🏆 SCOREBOARD LIVE STATUS DISPLAY ENGINE -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">Set your bet amount and press SPIN! Grand Finale Deluxe Edition Active.</span>
    </div>

    <!-- 🎛️ SYSTEM CONTROLS FOOTER INTERFACE -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleAceDeluxeSpinAction()">SPIN</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 SOCKET GATEWAY COUPLING AND TRANSACTION ROUTER -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // Upgrade Deluxe Edition Fallback Card Icon Struct Mappings
        const aceDeluxeDisplayMap = {
            "DELUXE_ACE": "🎴", 
            "DELUXE_KING": "👑", 
            "DELUXE_QUEEN": "👸", 
            "DELUXE_JACK": "🤺", 
            "GOLDEN_JOKER": "🃏", 
            "ROYAL_SPADE": "♠️", 
            "ROYAL_DIAMOND": "♦️"
        };

        // 🧠 SYNCHRONOUS VECTOR CARD ROTATION MODULE
        function animateAceDeluxeReels(serverReelsData, finalStatus, winAmount) {
            let completedReelsCount = 0;

            for (let i = 0; i < 5; i++) {
                const strip = document.getElementById(`strip-${i}`);
                const finalSymbol = serverReelsData[i];
                
                // Inject GPU Vector Acceleration Class
                strip.className = "reel-strip reel-blur-spinning-fast";
                
                let rollCounter = 0;
                const rollTimerInterval = setInterval(() => {
                    const tempPool = Object.keys(aceDeluxeDisplayMap);
                    const randomSymbol = tempPool[Math.floor(Math.random() * tempPool.length)];
                    
                    strip.innerHTML = `<div class="deluxe-tile">${aceDeluxeDisplayMap[randomSymbol]}</div>`;
                    rollCounter++;

                    // Cascading Mechanical Separation Brake Timing (i * 4)
                    if (rollCounter >= (12 + i * 4)) {
                        clearInterval(rollTimerInterval);
                        strip.className = "reel-strip final-symbol-pop-node";
                        
                        // Local PNG Alpha Channel Map with Fallback Support
                        const imgPath = `./images/${finalSymbol.toLowerCase()}.png`;
                        strip.innerHTML = `<img src="${imgPath}" class="tile-img-asset" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\"deluxe-tile\">${aceDeluxeDisplayMap[finalSymbol] || "🎴"}</div>';">`;
                        
                        completedReelsCount++;
                        playAudio('click');

                        if (completedReelsCount === 5) {
                            showFinalGameReward(finalStatus, winAmount);
                        }
                    }
                }, 65);
            }
        }

        // 🛫 SECURE API DEBIT TRANSMISSION TRANSACTION
        async function handleAceDeluxeSpinAction() {
            if (isSpinning) return;

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🎰 Dealing Deluxe Golden Card decks...";

            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/acedeluxe-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    animateAceDeluxeReels(data.reels, data.status, data.winAmount);
                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge BDT.");
                    stopSpinState();
                }
            } catch (err) {
                alert("⚠️ Transaction Timeout! Please tap SPIN again.");
                stopSpinState();
            }
        }

        // 🏆 STATE BUFFER WINDOW RESET AND DISPLAY LOGIC
        function showFinalGameReward(status, winAmount) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 DELUXE COMBO WIN!! Credited BDT: ৳${winAmount}`;
            } else {
                playAudio('wheel'); 
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ No winning combo matched! Shuffle again.`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopSpinState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleAceDeluxeSpinAction();
                }, 2600); 
            }
        }

        // 🔌 BACKEND BALANCE REALTIME PUSH STREAM interceptor
        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

               async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/acedeluxe-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Realtime balance query bypass log"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet += 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
            slotSounds.click.muted = isMuted;
            slotSounds.spin.muted = isMuted;
            slotSounds.win.muted = isMuted;
            slotSounds.wheel.muted = isMuted;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleAceDeluxeSpinAction();
            playAudio('click');
        }

        function stopSpinState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৪টি ওরিজিনাল প্রফেশনাল স্লট সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('wheel1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
